<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .status-bar {
            height: 47px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 15px;
            font-weight: 600;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
            box-sizing: border-box;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .logo i {
            font-size: 48px;
            color: #667eea;
        }
        .title {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        .form {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }
        .input-field {
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 0 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .input-field:focus {
            border-color: white;
            background: rgba(255, 255, 255, 0.2);
        }
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .forgot-password {
            text-align: right;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 24px;
            cursor: pointer;
        }
        .login-btn {
            width: 100%;
            height: 50px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 255, 255, 0.35);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }
        .divider::before {
            margin-right: 12px;
        }
        .divider::after {
            margin-left: 12px;
        }
        .social-btn {
            width: 100%;
            height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            background: transparent;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .sign-up {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }
        .sign-up a {
            color: white;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
    </div>
    
    <div class="content">
        <div class="logo-section">
            <div class="logo">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <div class="title">项目管理系统</div>
            <div class="subtitle">高效协作，精准管理</div>
        </div>
        
        <form class="form">
            <div class="input-group">
                <label class="input-label">用户名</label>
                <input type="text" class="input-field" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label class="input-label">密码</label>
                <input type="password" class="input-field" placeholder="请输入密码">
            </div>
            <div class="forgot-password">忘记密码？</div>
            <button type="submit" class="login-btn">登录</button>
        </form>
        
        <div class="divider">或</div>
        
        <button class="social-btn">
            <i class="fa-brands fa-apple"></i> 使用 Apple 登录
        </button>
        <button class="social-btn">
            <i class="fa-brands fa-weixin"></i> 使用微信登录
        </button>
        
        <div class="sign-up">
            还没有账号？ <a href="#">立即注册</a>
        </div>
    </div>
</body>
</html>
